<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Employee Attendance System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --primary-light: #e0e7ff;
      --surface: #ffffff;
      --surface-secondary: #f8fafc;
      --border: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --radius: 10px;
      --radius-lg: 14px;
      --shadow-md: 0 4px 6px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Inter', sans-serif;
      background: var(--surface-secondary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .page {
      min-height: calc(100vh - 60px - 52px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-md);
    }

    .card-header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .card-header .icon-wrap {
      width: 48px;
      height: 48px;
      background: var(--primary-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }

    .card-header .icon-wrap svg {
      width: 24px;
      height: 24px;
      fill: var(--primary);
    }

    .card-header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .card-header p {
      font-size: 13px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 9px 12px;
      font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      background: var(--surface-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .btn-primary {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: white;
      background: var(--primary);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 14px;
    }

    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:active { transform: scale(0.99); }

    .btn-link {
      display: inline-block;
      font-size: 13.5px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: var(--primary);
      text-decoration: none;
      padding: 4px 0;
      transition: color 0.15s;
    }

    .btn-link:hover { color: var(--primary-dark); text-decoration: underline; }

    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 13.5px;
      margin-bottom: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .alert-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: var(--primary-dark);
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
    }

    footer {
      text-align: center;
      padding: 14px 1rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      font-size: 12.5px;
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <span class="brand-name">Employee Attendance System</span>
</nav>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C9.243 2 7 4.243 7 7s2.243 5 5 5 5-2.243 5-5S14.757 2 12 2zm0 8c-1.654 0-3-1.346-3-3s1.346-3 3-3 3 1.346 3 3-1.346 3-3 3zm8 12v-1c0-3.859-3.141-7-7-7h-2c-3.86 0-7 3.141-7 7v1h2v-1c0-2.757 2.243-5 5-5h2c2.757 0 5 2.243 5 5v1h2z"/>
        </svg>
      </div>
      <h1>Login</h1>
      <p>Enter your credentials to mark attendance</p>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="alert">
      <span>{{ messages[0] }}</span>
      <button class="alert-close" onclick="this.parentElement.remove()">&times;</button>
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="emp_id">Employee ID</label>
        <input type="text" id="emp_id" name="emp_id" placeholder="Enter Employee ID" required>
      </div>

      <div class="form-group">
        <label for="emp_name">Employee Name</label>
        <input type="text" id="emp_name" name="emp_name" placeholder="Enter Employee Name" required>
      </div>

      <button class="btn-primary" type="submit">Login</button>
    </form>

    <div>
      <a href="{{ url_for('dashboard') }}" class="btn-link">Go to Dashboard</a>
    </div>
  </div>
</div>

<footer>&copy; 2025 Attendance Management System. All Rights Reserved.</footer>

</body>
</html>
